# Example 1: admin and mock traffic on the same parent domain.
#
#   https://mock-machine.example.com/mockadmin
#   https://<project-key>.mock-machine.example.com/api/users
#
# The project key is extracted from the first subdomain label and forwarded to
# the backend as X-Mock-Project. Backend route matching still receives the
# original request path, for example /api/users.

server {
    listen 443 ssl http2;
    server_name mock-machine.example.com;

    client_max_body_size 25m;

    ssl_certificate /etc/nginx/certs/mock-machine.example.com.crt;
    ssl_certificate_key /etc/nginx/certs/mock-machine.example.com.key;

    location = /mockadmin {
        return 301 /mockadmin/;
    }

    location /mockadmin/ {
        proxy_pass http://frontend:5173/mockadmin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /mockadminapi/ {
        proxy_pass http://backend:8080/mockadminapi/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://backend:8080/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    server_name ~^(?<mock_project_key>[a-z0-9][a-z0-9-]{2,31})\.mock-machine\.example\.com$;

    client_max_body_size 25m;

    ssl_certificate /etc/nginx/certs/wildcard.mock-machine.example.com.crt;
    ssl_certificate_key /etc/nginx/certs/wildcard.mock-machine.example.com.key;

    location / {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Mock-Project $mock_project_key;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

